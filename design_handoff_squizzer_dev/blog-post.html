const App = () => {

        <header className="post-header">

            <span>14 Apr 2026</span>

          </div>
          <h1>Why I rewrote the calendar card from scratch (twice)</h1>
          <p className="lede">
            First attempt: a thin wrapper. Second attempt: a fork. Third attempt: actually understanding ResizeObserver. A post-mortem on what auto-scaling really means.
          </p>
          <div className="author">
            <span className="avatar">MS</span>
            <span>Mark Squires · Buckinghamshire, UK</span>
          </div>
        </header>

        <article className="post-body">
          <p>
            The default Home Assistant calendar card is fine if you have one calendar, you only care about today, and you size your tile exactly the way the original author imagined. Three calendars and a 2×1 footprint? It falls apart. So I rewrote it. And then I rewrote it again. This is a post about the failure modes I discovered in between, because I think they're useful.
          </p>

          <h2>The first attempt: a thin wrapper</h2>
          <p>
            The original calendar card renders an agenda list. My naive plan was to keep that rendering and just add multi-calendar support on top. Pull events from N entities, dedupe, sort, hand the list back to the existing renderer. About a hundred lines of code.
          </p>
          <p>
            It worked. It also looked terrible. The renderer assumed events came from one source and styled them with a single colour. My "wrap it" approach meant I either monkey-patched the renderer (fragile) or post-processed the rendered DOM to recolour event chips (also fragile, and the recolour ran <em>after</em> Lovelace's animation, so events would flash one colour then snap to another). I shipped it for a week and then took it down.
          </p>

          <pre className="code-block">{`// v0.1 — the bad idea, simplified
class CalendarEventsCard extends LitElement {
  render() {
    const events = this.config.entities.flatMap(
      e => this.hass.states[e].attributes.events || []
    );
    return html\`<hui-calendar-card
      .events=\${events}
    ></hui-calendar-card>\`;
  }
}`}</pre>

          <p>
            <code>hui-calendar-card</code> is a private component. Reading from <code>this.hass.states[...].attributes.events</code> only works if the calendar integration happens to populate that attribute on every refresh, which most don't. I was reaching into HA's private API and hoping nothing changed. It changed.
          </p>

          <h2>The second attempt: forking the original</h2>
          <p>
            So I forked. I copied the official card's source, ripped out the parts I didn't need, and rebuilt the rendering loop. This time I controlled the colour mapping, I called the calendar API directly, and I had a real <code>config</code> schema with multi-entity support.
          </p>
          <p>
            And it still looked bad — but for a different reason. <strong>Auto-scaling.</strong>
          </p>
          <p>
            The original card uses a fixed font size. At a 4-wide tile that's fine. At a 1-wide tile the date heading wraps, the time-strings overflow, and the event chip sits half off the edge. The CSS-only fix everyone reaches for is <code>font-size: clamp(...)</code> based on viewport units. That doesn't work in a Lovelace card, because the card doesn't fill the viewport — it fills whatever cell the layout engine gives it, which depends on the user's grid config and is frequently wrong by a factor of two.
          </p>

          <div className="callout">
            <strong>The lesson:</strong> in a tile-based dashboard, the card has no idea how big it will be until <em>after</em> it's been placed. Any sizing logic that runs in <code>render()</code> is too early.
          </div>

          <h2>The third attempt: ResizeObserver</h2>
          <p>
            <code>ResizeObserver</code> fires when an element's size changes, including the first time it's measured. The pattern is: render the card at a baseline font size, observe the container, and rescale the inner content based on the actual measured width.
          </p>

          <pre className="code-block">{`// v1.0 — auto-scaling that actually works
const BASE_WIDTH = 360;
const MIN_SCALE = 0.6;
const MAX_SCALE = 1.4;

class CalendarEventsCard extends LitElement {
  firstUpdated() {
    this._ro = new ResizeObserver(([entry]) => {
      const w = entry.contentRect.width;
      const scale = Math.max(
        MIN_SCALE,
        Math.min(MAX_SCALE, w / BASE_WIDTH)
      );
      this.style.setProperty("--cec-scale", scale);
    });
    this._ro.observe(this);
  }
  disconnectedCallback() {
    super.disconnectedCallback();
    this._ro?.disconnect();
  }
}`}</pre>

          <p>
            With <code>--cec-scale</code> exposed as a CSS custom property, every text size in the card becomes <code>calc(13px * var(--cec-scale))</code> and the whole layout breathes with the tile size. No more wrapped headings. No more clipped chips. No more guessing.
          </p>

          <h3>The DST gotcha</h3>
          <p>
            Once layout was solid, I shipped v1.0 — and immediately got an issue filed about all-day events on the 27th of October showing on the 26th. DST. The events come back as ISO strings with a <code>Z</code> suffix; if you parse them with <code>new Date()</code> and then call <code>.toLocaleDateString()</code>, you get the local date. <em>Almost.</em>
          </p>
          <p>
            All-day events are special. They aren't anchored to a time zone — they're a calendar date, full stop. The 27th of October in your calendar is the 27th of October regardless of where you are. If you treat <code>2026-10-27T00:00:00Z</code> as a moment-in-time and convert to local, you will be off by one whenever your local offset is negative at that moment. Which it is, in the UK, exactly during the DST switchover.
          </p>

          <pre className="code-block">{`// Parse "all day" events as date-only, never as instants
function parseEventStart(ev) {
  if (ev.start.date) {
    // All-day: "2026-10-27"
    const [y, m, d] = ev.start.date.split("-").map(Number);
    return new Date(y, m - 1, d); // local midnight, no offset
  }
  return new Date(ev.start.dateTime); // timed event, has offset
}`}</pre>

          <h2>What I'd do differently</h2>
          <ul>
            <li><strong>Start with a config schema, not a render loop.</strong> v0.1 wrapped a renderer; v1.0 starts from "what does the user type into YAML" and builds outward. The second framing is much harder to paint yourself into a corner with.</li>
            <li><strong>Don't reach into private HA components.</strong> If you find yourself rendering <code>hui-*</code> tags by name, stop. They're private for a reason.</li>
            <li><strong>Layout decisions belong in observers, not render.</strong> Lovelace cards are placed, not painted. <code>ResizeObserver</code> is the API that respects that.</li>
            <li><strong>All-day events are dates, not instants.</strong> If you remember nothing else from this post, remember that.</li>
          </ul>

          <hr />

          <p>
            v1.2 just landed with the visual editor and stable colour mapping. <a href="card-calendar.html">The card detail page has the install instructions and config reference.</a> Issues, PRs and "you're holding it wrong" tickets all welcome on <a href="https://github.com/squizzer73/calendar-events-card" target="_blank" rel="noreferrer">the repo</a>.
          </p>
        </article>

};
